const tagMap = {
  hot: { cls: "tag-hot", icon: "ti-flame", label: "Exam hot" },
  key: { cls: "tag-key", icon: "ti-key", label: "Conceptual" },
  geo: { cls: "tag-geo", icon: "ti-map-pin", label: "Geography" },
  fig: { cls: "tag-fig", icon: "ti-user-star", label: "Key figures" }
};

let expanded = new Set();
let allExpanded = false;

function toggleAll() {
  const btn = document.querySelector('.expand-all');
  if (allExpanded) {
    expanded.clear();
    btn.textContent = 'Expand all';
  } else {
    data.forEach((e,i) => expanded.add(i));
    btn.textContent = 'Collapse all';
  }
  allExpanded = !allExpanded;
  render();
}

function toggle(i) {
  if (expanded.has(i)) expanded.delete(i);
  else expanded.add(i);
  updateProgress();
  render();
}

function updateProgress() {
  const total = data.length;
  const pct = total ? Math.round((expanded.size / total) * 100) : 0;
  document.getElementById('prog').style.width = pct + '%';
}

function render() {
  const container = document.getElementById('syllabus');
  container.innerHTML = '';
  data.forEach((era, i) => {
    const isOpen = expanded.has(i);
    const block = document.createElement('div');
    block.className = 'era-block';

    const header = document.createElement('div');
    header.className = 'era-header' + (isOpen ? ' open' : '');
    header.onclick = () => { toggle(i); };

    header.innerHTML = `
      <span class="era-badge ${era.badge}">${era.era.split(' ')[0]}</span>
      <span class="era-title">${era.era}</span>
      <span class="era-years">${era.years}</span>
      <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
    `;

    const body = document.createElement('div');
    body.className = 'era-body' + (isOpen ? ' open' : '');

    era.units.forEach(u => {
      const unit = document.createElement('div');
      unit.className = 'unit';
      const tagHtml = (u.tags || []).map(t => {
        const m = tagMap[t];
        return `<span class="tag ${m.cls}"><i class="ti ${m.icon}" style="font-size:11px" aria-hidden="true"></i>${m.label}</span>`;
      }).join('');
      const liHtml = u.topics.map(t => `<li>${t}</li>`).join('');
      unit.innerHTML = `
        <div class="unit-num">${u.num}</div>
        <div class="unit-title">${u.title}</div>
        <ul class="topics">${liHtml}</ul>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">${tagHtml}</div>
      `;
      body.appendChild(unit);
    });

    block.appendChild(header);
    block.appendChild(body);
    container.appendChild(block);
  });
  updateProgress();
}

render();
